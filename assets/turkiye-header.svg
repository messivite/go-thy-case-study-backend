<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Turkiye themed project header">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b3001b"/>
      <stop offset="100%" stop-color="#e30a17"/>
      <animate attributeName="x1" values="0;0.03;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;0.97;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- Crescent -->
  <circle cx="140" cy="110" r="58" fill="#ffffff" filter="url(#softGlow)"/>
  <circle cx="157" cy="110" r="47" fill="#d30b16"/>

  <!-- Star -->
  <polygon
    points="220,79 228,100 251,100 233,114 240,136 220,123 200,136 207,114 189,100 212,100"
    fill="#ffffff"
    filter="url(#softGlow)"
  />

  <text x="290" y="105" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="40" font-weight="700" fill="#ffffff">
    THY Case Study Backend
  </text>
  <text x="292" y="142" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" fill="#ffe7ea">
    Mustafa AKSOY • Supabase Auth • JWT Role Claims • Go API
  </text>

  <rect x="0" y="214" width="1200" height="6" fill="#ffffff" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
