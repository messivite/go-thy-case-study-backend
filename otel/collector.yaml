# Yerel deneme: OTLP alır, trace'leri konsola yazar.
# Çalıştır: ./otelcol --config=/TAM/YOL/thy-case-study-backend/otel/collector.yaml
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug]
