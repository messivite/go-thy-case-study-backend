name: Tag version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      target:
        description: "Branch to tag from"
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Calculate next version
        id: semver
        shell: bash
        run: |
          last_tag="$(git tag -l 'v*.*.*' --sort=-v:refname | head -n 1)"
          if [ -z "$last_tag" ]; then
            major=0; minor=0; patch=0
          else
            version="${last_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
          fi

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1)); minor=0; patch=0 ;;
            minor)
              minor=$((minor + 1)); patch=0 ;;
            patch)
              patch=$((patch + 1)) ;;
            *)
              echo "Unsupported bump type"; exit 1 ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Next tag: $next_tag"

      - name: Create and push tag
        run: |
          git tag "${{ steps.semver.outputs.next_tag }}"
          git push origin "${{ steps.semver.outputs.next_tag }}"
