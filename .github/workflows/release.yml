name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Manual run'da GitHub Release publish et"
        required: true
        default: false
        type: boolean
      tag:
        description: "Publish edilecek mevcut tag (or: v0.0.3)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

      - name: Vet
        run: go vet ./...

  goreleaser:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate manual publish input
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish && inputs.tag == '' }}
        run: |
          echo "Manual publish icin 'tag' alani zorunludur (ornek: v0.0.3)." >&2
          exit 1

      - name: Checkout selected tag for manual publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish && inputs.tag != '' }}
        run: |
          git fetch --tags --force
          git checkout "tags/${{ inputs.tag }}"

      - name: Run GoReleaser (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (manual publish)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish && inputs.tag != '' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (snapshot for manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.publish }}
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
