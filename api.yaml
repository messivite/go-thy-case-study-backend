version: "1"
basePath: /api
output:
  serverDir: server
  handlersDir: handlers
endpoints:
  - method: GET
    path: /health
    handler: Health
    auth: false
  - method: GET
    path: /me
    handler: Me
    auth: true
  - method: GET
    path: /providers
    handler: ListProviders
    auth: true
  - method: POST
    path: /chats
    handler: CreateSession
    auth: true
  - method: GET
    path: /chats
    handler: ListSessions
    auth: true
  - method: GET
    path: /chats/{chatID}
    handler: GetChat
    auth: true
  - method: POST
    path: /chats/{chatID}/messages
    handler: PostMessage
    auth: true
  - method: POST
    path: /chats/{chatID}/stream
    handler: StreamMessage
    auth: true
