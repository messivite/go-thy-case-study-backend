# Chat HTTP sözleşmesi: handler'lar internal/chat + internal/app/server.go içinde (gosupabase codegen bu path'leri kullanmıyor).
# Sunucu / önbellek ayarı bu dosyada değil: CACHE_ENABLED, CACHE_BACKEND, CACHE_TTL_* , REDIS_* ortam değişkenleri (internal/cache.FromEnv + thy-case-llm cache config).
# POST /api/chats
#   body:  { "title"?: string, "provider"?: string, "model"?: string, "content"?: string }
#   201:   content yoksa { "id", "provider", "model" }; content varsa ayrıca "assistantMessage" (içinde "liked"), "usage"
# GET /api/chats
#   200:   legacy array OR pagination object (when limit/cursor verilir):
#          { "totalCount","hasNext","nextCursor","items":[{...}] }
# GET /api/chats/{chatID}
#   200:   messages[].liked: null (hiç log yok/system), true (action 1), false (action 2 / unlike satırı)
# DELETE /api/chats/{chatID}
#   204:   soft-delete session (deleted_at set), ownership required
# GET /api/chats/{chatID}/messages
#   query: limit, cursor, direction=older|newer
#   200:   items[].liked: null | true | false (yukarıdaki gibi)
# DELETE /api/chats/{chatID}/messages/{messageID}
#   204:   kullanıcı sadece kendi user mesajını soft-delete edebilir
# POST /api/chats/{chatID}/messages/{messageID}/like
#   body:  { "action": 1 | 2 }  — 1=liked=true, 2=liked=false (satır kalır); oturum sahibi, kendi user veya asistan mesajı
#   200:   { "state": 1 | 2 }    — 1=beğenili, 2=unlike kayıtlı
# POST /api/chats/{chatID}/likes/sync  — offline like/unlike kuyruğu (toplu veya tek)
#   body:  { "items": [ { "messageId": uuid, "action": 1|2 }, ... ] }  (1..100)  VEYA  { "messageId": uuid, "action": 1|2 }
#   200:   { "results": [ { "messageId", "ok", "state"?: 1|2, "code"?: string }, ... ] }  — satır bazlı hata kodları (ok=false)
# POST /api/chats/{chatID}/messages
#   body:  { "provider"?, "model"?, "content"?, "messages"? }
#   201:   { "assistantMessage": { ...,"liked" }, "usage"?: object }
# POST /api/chats/{chatID}/stream
#   body:  aynı; cevap text/event-stream, data: JSON (meta | delta | done)
#   İlk meta: userMessageId, provider, model (kullanıcı mesajı DB'ye yazıldıktan hemen sonra; assistantMessageId yoktur).
#   done / iptal sonrası kısmi kayıt meta: userMessageId + assistantMessageId (+ partial vb.).
# PATCH /api/me — profil (JSON veya multipart/form-data); avatar dosyası 300×300 JPEG'e indirgenir, Supabase Storage bucket `avatars`, profiles.avatar_url güncellenir
# GET /api/me/usage — günlük/haftalık token kotası + kullanım (UTC; outcome=ok)
# GET /api/models — seçilebilir LLM modelleri (Supabase’te aktif katalog; açılışta registry ile sync)
version: "1"
basePath: /api
output:
  serverDir: server
  handlersDir: handlers

endpoints:
  - method: GET
    path: /health
    handler: Health
    auth: false
  - method: GET
    path: /me
    handler: Me
    auth: true
  - method: PATCH
    path: /me
    handler: PatchMe
    auth: true
  - method: GET
    path: /me/usage
    handler: MeUsage
    auth: true
  - method: GET
    path: /chats/search
    handler: SearchChats
    auth: true
  - method: GET
    path: /providers
    handler: ListProviders
    auth: true
  - method: GET
    path: /models
    handler: ListModels
    auth: true
  - method: POST
    path: /chats
    handler: CreateSession
    auth: true
  - method: GET
    path: /chats
    handler: ListSessions
    auth: true
  - method: GET
    path: /chats/{chatID}
    handler: GetChat
    auth: true
  - method: DELETE
    path: /chats/{chatID}
    handler: DeleteSession
    auth: true
  - method: GET
    path: /chats/{chatID}/messages
    handler: ListMessages
    auth: true
  - method: DELETE
    path: /chats/{chatID}/messages/{messageID}
    handler: DeleteMessage
    auth: true
  - method: POST
    path: /chats/{chatID}/messages/{messageID}/like
    handler: PostMessageLike
    auth: true
  - method: POST
    path: /chats/{chatID}/likes/sync
    handler: PostSyncMessageLikes
    auth: true
  - method: POST
    path: /chats/{chatID}/messages
    handler: PostMessage
    auth: true
  - method: POST
    path: /chats/{chatID}/stream
    handler: StreamMessage
    auth: true
