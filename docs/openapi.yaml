openapi: "3.1.0"
info:
  title: THY Case Study Backend API
  description: |
    LLM sohbet backend servisi.
    Supabase tabanlı kimlik doğrulama, çoklu LLM provider desteği,
    token kota yönetimi ve etkileşim audit loglama içerir.
  version: "1.0.0"
servers:
  - url: /api
    description: Default API base path
security:
  - bearerAuth: []
tags:
  - name: health
    description: Sistem sağlık kontrolü
  - name: auth
    description: Kimlik doğrulama
  - name: providers
    description: LLM provider yönetimi
  - name: chats
    description: Sohbet oturumları
  - name: messages
    description: Mesaj gönderme ve stream
paths:
  /chats:
    get:
      tags: [chats]
      summary: Sohbet listesi
      operationId: listSessions
      responses:
        "200":
          description: Sohbet listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [chats]
      summary: Yeni sohbet oturumu oluştur
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Oturum oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /chats/search:
    get:
      tags: [misc]
      summary: SearchChats
      operationId: searchChats
      responses:
        "200":
          description: OK
        "401":
          $ref: "#/components/responses/Unauthorized"
  /chats/{chatID}:
    delete:
      tags: [misc]
      summary: DeleteSession
      operationId: deleteSession
      parameters:
        - $ref: "#/components/parameters/chatID"
      responses:
        "200":
          description: OK
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [chats]
      summary: Sohbet detayı
      operationId: getChat
      parameters:
        - $ref: "#/components/parameters/chatID"
      responses:
        "200":
          description: Sohbet detayı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /chats/{chatID}/messages:
    get:
      tags: [misc]
      summary: ListMessages
      operationId: listMessages
      parameters:
        - $ref: "#/components/parameters/chatID"
      responses:
        "200":
          description: OK
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [messages]
      summary: Mesaj gönder (non-stream)
      operationId: postMessage
      parameters:
        - $ref: "#/components/parameters/chatID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "201":
          description: Asistan yanıtı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
        "502":
          $ref: "#/components/responses/ProviderError"
        "504":
          $ref: "#/components/responses/ProviderTimeout"
  /chats/{chatID}/stream:
    post:
      tags: [messages]
      summary: Mesaj gönder (SSE stream)
      operationId: streamMessage
      parameters:
        - $ref: "#/components/parameters/chatID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/QuotaExceeded"
        "502":
          $ref: "#/components/responses/ProviderError"
        "504":
          $ref: "#/components/responses/ProviderTimeout"
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: health
      security: []
      responses:
        "200":
          description: Servis aktif
          content:
            text/plain:
              schema:
                type: string
                example: OK
  /me:
    get:
      tags: [auth]
      summary: Mevcut kullanıcı bilgisi
      operationId: getMe
      responses:
        "200":
          description: Kimlik doğrulanmış kullanıcı bilgisi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/usage:
    get:
      tags: [misc]
      summary: MeUsage
      operationId: meUsage
      responses:
        "200":
          description: OK
        "401":
          $ref: "#/components/responses/Unauthorized"
  /providers:
    get:
      tags: [providers]
      summary: Aktif LLM provider listesi
      operationId: listProviders
      responses:
        "200":
          description: Provider listesi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProvidersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase access token
  parameters:
    chatID:
      name: chatID
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    AuthenticatedUser:
      type: object
      properties:
        UserID: { type: string, format: uuid }
        Email: { type: string, format: email }
        Role: { type: string }
      required: [UserID, Email, Role]
    ProviderInfo:
      type: object
      properties:
        name: { type: string }
        model: { type: string }
        enabled: { type: boolean }
      required: [name, model, enabled]
    ListProvidersResponse:
      type: object
      properties:
        default: { type: string }
        providers:
          type: array
          items: { $ref: "#/components/schemas/ProviderInfo" }
      required: [default, providers]
    CreateSessionRequest:
      type: object
      properties:
        title: { type: string }
        provider: { type: string }
        model: { type: string }
    CreateSessionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        provider: { type: string }
        model: { type: string }
      required: [id, provider, model]
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content: { type: string }
        provider: { type: string }
        model: { type: string }
      required: [role, content]
    ChatListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        provider: { type: string }
        model: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        lastMessagePreview: { type: string }
      required: [id, title, provider, model, createdAt, updatedAt]
    ChatDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        provider: { type: string }
        model: { type: string }
        messages:
          type: array
          items: { $ref: "#/components/schemas/ChatMessage" }
      required: [id, title, provider, model, messages]
    PostMessageRequest:
      type: object
      properties:
        provider: { type: string }
        model: { type: string }
        content: { type: string }
        messages:
          type: array
          items: { $ref: "#/components/schemas/ChatMessage" }
    AssistantResponse:
      type: object
      properties:
        assistantMessage: { $ref: "#/components/schemas/ChatMessage" }
        usage:
          type: object
          additionalProperties: true
      required: [assistantMessage]
    ErrorBody:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
      required: [code, message]
    ErrorEnvelope:
      type: object
      properties:
        error: { $ref: "#/components/schemas/ErrorBody" }
      required: [error]
  responses:
    Unauthorized:
      description: Kimlik doğrulama gerekli
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    BadRequest:
      description: Geçersiz istek
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Kaynak bulunamadı
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    QuotaExceeded:
      description: Token kotası aşıldı
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ProviderError:
      description: LLM provider hatası
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ProviderTimeout:
      description: LLM provider zaman aşımı
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
